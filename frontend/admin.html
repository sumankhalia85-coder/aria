<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pain Point Mapper — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #030812;
  --surface: #070F1E;
  --surface2: #0A1628;
  --border: #0E2040;
  --electric: #00D4FF;
  --electric-dim: rgba(0,212,255,0.12);
  --amber: #FF8C00;
  --green: #00C896;
  --red: #FF3B3B;
  --text: #E8F4F8;
  --muted: #4A6B8A;
  --dim: #7A9BB5;
  --font: 'Syne', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}
body{background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,212,255,0.08),transparent);}

.header{
  border-bottom:1px solid var(--border);padding:20px 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,15,30,0.9);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:14px;}
.logo-orb{
  width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#00D4FF,#003D4D);
  box-shadow:0 0 20px rgba(0,212,255,0.4);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.logo h1{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.logo p{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);}
.nav-links{display:flex;gap:8px;}
.nav-btn{
  padding:8px 18px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;font-family:var(--font);
  font-size:13px;font-weight:600;transition:all 0.2s;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-btn:hover,.nav-btn.active{border-color:var(--electric);color:var(--electric);background:var(--electric-dim);}

.container{max-width:1100px;margin:0 auto;padding:40px 40px;}

.page-title{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:6px;}
.page-subtitle{color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:1px;margin-bottom:40px;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:28px;
}
.card-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--electric);margin-bottom:20px;display:flex;align-items:center;gap:8px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:var(--mono);}
.field input,.field textarea,.field select{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;color:var(--text);
  font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--electric);}
.field textarea{resize:vertical;min-height:90px;line-height:1.6;}

.tags-input{display:flex;flex-wrap:wrap;gap:6px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:8px 10px;min-height:44px;cursor:text;}
.tags-input:focus-within{border-color:var(--electric);}
.tag{
  background:var(--electric-dim);border:1px solid rgba(0,212,255,0.3);
  border-radius:6px;padding:3px 8px;font-size:12px;color:var(--electric);
  display:flex;align-items:center;gap:4px;
}
.tag-remove{cursor:pointer;opacity:0.6;}
.tag-remove:hover{opacity:1;}
.tags-input input{
  border:none;background:transparent;outline:none;color:var(--text);
  font-family:var(--font);font-size:13px;min-width:120px;flex:1;padding:2px;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 24px;border-radius:10px;border:none;cursor:pointer;
  font-family:var(--font);font-size:14px;font-weight:700;transition:all 0.2s;
}
.btn-electric{background:var(--electric);color:#000;}
.btn-electric:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-electric:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;color:var(--electric);border:1px solid var(--electric);}
.btn-outline:hover{background:var(--electric-dim);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;}
.btn-full{width:100%;}

.project-list{display:flex;flex-direction:column;gap:12px;}
.project-item{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
  transition:border-color 0.2s;cursor:pointer;
}
.project-item:hover{border-color:var(--electric);}
.project-item-info h3{font-size:15px;font-weight:700;margin-bottom:3px;}
.project-item-info p{font-size:12px;color:var(--dim);font-family:var(--mono);}
.project-item-actions{display:flex;gap:8px;align-items:center;}
.badge{
  padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;
  letter-spacing:1px;font-family:var(--mono);
}
.badge-active{background:rgba(0,200,150,0.15);color:var(--green);border:1px solid rgba(0,200,150,0.3);}

.copy-link{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:11px;
  color:var(--dim);display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-top:12px;
}
.copy-link span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}

.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface);border:1px solid var(--electric);
  border-radius:10px;padding:12px 18px;font-size:13px;
  display:flex;align-items:center;gap:8px;z-index:9999;
  animation:slideUp 0.3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.5);
  font-family:var(--mono);
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

.spinner{
  width:16px;height:16px;border:2px solid transparent;
  border-top:2px solid currentColor;border-radius:50%;
  animation:spin 0.7s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg);}}

.empty{text-align:center;padding:50px;color:var(--muted);}
.empty h3{font-size:18px;margin-bottom:8px;color:var(--dim);}
.empty p{font-size:13px;font-family:var(--mono);}

.section-divider{
  display:flex;align-items:center;gap:12px;margin:32px 0 24px;
  color:var(--muted);font-size:11px;font-family:var(--mono);letter-spacing:2px;
}
.section-divider::before,.section-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-orb">⬡</div>
    <div>
      <h1>Pain Point Mapper</h1>
      <p>Admin Console</p>
    </div>
  </div>
  <nav class="nav-links">
    <a href="admin.html" class="nav-btn active">⚙ Admin</a>
    <a href="index.html" class="nav-btn">🎙 Customer View</a>
  </nav>
</header>

<div class="container">
  <div class="page-title">Project Configuration</div>
  <div class="page-subtitle">// CONFIGURE RESEARCH PROJECTS · MANAGE CUSTOMER SESSIONS</div>

  <div class="grid-2">
    <!-- CREATE PROJECT FORM -->
    <div class="card">
      <div class="card-title">◈ Create New Project</div>

      <div class="field">
        <label>Project Name *</label>
        <input type="text" id="projName" placeholder="e.g. Customer Portal Redesign"/>
      </div>
      <div class="field">
        <label>Product Description</label>
        <textarea id="projDesc" placeholder="Describe the SaaS product and what it does..."></textarea>
      </div>
      <div class="field">
        <label>Research Goals</label>
        <textarea id="projGoals" placeholder="What specific pain points do you want to uncover? What will the UX team use this for?" style="min-height:70px;"></textarea>
      </div>
      <div class="field">
        <label>Focus Areas (press Enter to add)</label>
        <div class="tags-input" id="tagsContainer">
          <input type="text" id="tagInput" placeholder="e.g. onboarding, dashboard, integrations..."/>
        </div>
      </div>
      <div class="field">
        <label>Custom Greeting (optional)</label>
        <input type="text" id="projGreeting" placeholder="Leave blank for AI-generated greeting"/>
      </div>
      <div class="field">
        <label>Max Conversation Turns</label>
        <input type="number" id="projMaxTurns" value="12" min="6" max="20"/>
      </div>
      <button class="btn btn-electric btn-full" id="createProjectBtn">◈ Create Project</button>

      <div id="projectLink" style="display:none;">
        <div class="section-divider">CUSTOMER LINK</div>
        <div class="copy-link">
          <span id="linkText"></span>
          <button class="btn btn-outline btn-sm" onclick="copyLink()">Copy</button>
        </div>
      </div>
    </div>

    <!-- PROJECT LIST -->
    <div class="card">
      <div class="card-title">◈ Active Projects</div>
      <div id="projectList">
        <div class="empty">
          <h3>No projects yet</h3>
          <p>Create your first project →</p>
        </div>
      </div>
    </div>
  </div>

  <!-- REPORTS SECTION -->
  <div class="section-divider">REPORTS</div>
  <div class="card" id="reportsCard" style="display:none;">
    <div class="card-title">◈ Session Reports — <span id="reportsProjectName"></span></div>
    <div id="reportsList"></div>
  </div>
</div>

<script>
const API = 'https://backend-wine-tau-27.vercel.app/api/v1';
let focusTags = [];
let currentProjectId = null;

// Tags input
const tagInput = document.getElementById('tagInput');
tagInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = tagInput.value.trim().replace(/,/g,'');
    if (val && !focusTags.includes(val)) {
      focusTags.push(val);
      renderTags();
    }
    tagInput.value = '';
  }
});

function renderTags() {
  const container = document.getElementById('tagsContainer');
  container.querySelectorAll('.tag').forEach(t => t.remove());
  focusTags.forEach((tag, i) => {
    const el = document.createElement('div');
    el.className = 'tag';
    el.innerHTML = `${tag} <span class="tag-remove" data-i="${i}">×</span>`;
    container.insertBefore(el, tagInput);
  });
  container.querySelectorAll('.tag-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      focusTags.splice(parseInt(btn.dataset.i), 1);
      renderTags();
    });
  });
}

// Create project
document.getElementById('createProjectBtn').addEventListener('click', async () => {
  const name = document.getElementById('projName').value.trim();
  if (!name) { showToast('Project name is required'); return; }

  const btn = document.getElementById('createProjectBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Creating...';

  try {
    const res = await fetch(`${API}/projects`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name,
        description: document.getElementById('projDesc').value.trim(),
        goals: document.getElementById('projGoals').value.trim(),
        focus_areas: focusTags,
        greeting_message: document.getElementById('projGreeting').value.trim(),
        max_turns: parseInt(document.getElementById('projMaxTurns').value) || 12,
        industry: 'SaaS'
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    const link = `${window.location.origin}/index.html?project=${data.id}`;
    document.getElementById('projectLink').style.display = 'block';
    document.getElementById('linkText').textContent = link;
    currentProjectId = data.id;

    showToast('✓ Project created!');
    loadProjects();

    // Reset form
    document.getElementById('projName').value = '';
    document.getElementById('projDesc').value = '';
    document.getElementById('projGoals').value = '';
    document.getElementById('projGreeting').value = '';
    focusTags = [];
    renderTags();
  } catch(e) {
    showToast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '◈ Create Project';
  }
});

async function loadProjects() {
  try {
    const res = await fetch(`${API}/projects`);
    const projects = await res.json();
    const list = document.getElementById('projectList');

    if (!projects.length) {
      list.innerHTML = '<div class="empty"><h3>No projects yet</h3><p>Create your first project →</p></div>';
      return;
    }

    list.innerHTML = '';
    const ul = document.createElement('div');
    ul.className = 'project-list';
    projects.forEach(p => {
      const item = document.createElement('div');
      item.className = 'project-item';
      item.innerHTML = `
        <div class="project-item-info">
          <h3>${p.name}</h3>
          <p>${p.description ? p.description.slice(0,60)+'...' : 'No description'} · ${p.focus_areas?.length || 0} focus areas</p>
        </div>
        <div class="project-item-actions">
          <span class="badge badge-active">ACTIVE</span>
          <button class="btn btn-outline btn-sm" onclick="copyProjectLink('${p.id}')">Link</button>
          <button class="btn btn-outline btn-sm" onclick="loadReports('${p.id}', '${p.name}')">Reports</button>
        </div>`;
      ul.appendChild(item);
    });
    list.appendChild(ul);
  } catch(e) {
    console.error(e);
  }
}

function copyProjectLink(projectId) {
  const link = `${window.location.origin}/index.html?project=${projectId}`;
  navigator.clipboard.writeText(link).then(() => showToast('✓ Link copied!'));
}

function copyLink() {
  const link = document.getElementById('linkText').textContent;
  navigator.clipboard.writeText(link).then(() => showToast('✓ Link copied!'));
}

async function loadReports(projectId, projectName) {
  document.getElementById('reportsCard').style.display = 'block';
  document.getElementById('reportsProjectName').textContent = projectName;

  try {
    const res = await fetch(`${API}/admin/reports/${projectId}`);
    const reports = await res.json();
    const list = document.getElementById('reportsList');

    if (!reports.length) {
      list.innerHTML = '<div class="empty"><p>No reports yet for this project</p></div>';
      return;
    }

    list.innerHTML = '';
    reports.forEach(r => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;';
      row.innerHTML = `
        <div>
          <div style="font-weight:700;font-size:14px;">${r.customer_name}</div>
          <div style="font-size:11px;color:var(--dim);font-family:var(--mono);">${r.customer_role} · ${r.customer_company} · ${r.pain_points_count} pain points</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline btn-sm" onclick="viewReport('${r.session_id}')">View</button>
          <button class="btn btn-electric btn-sm" onclick="downloadPDF('${r.session_id}', '${r.customer_name}')">PDF</button>
        </div>`;
      list.appendChild(row);
    });
  } catch(e) {
    showToast('Error loading reports');
  }
  document.getElementById('reportsCard').scrollIntoView({behavior:'smooth'});
}

async function viewReport(sessionId) {
  window.open(`report.html?session=${sessionId}`, '_blank');
}

async function downloadPDF(sessionId, name) {
  const res = await fetch(`${API}/reports/export/pdf/${sessionId}`);
  if (!res.ok) { showToast('Generate report first'); return; }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `ux_brief_${name.replace(/\s/g,'_')}.pdf`;
  a.click(); URL.revokeObjectURL(url);
  showToast('✓ PDF downloaded!');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

loadProjects();
</script>
</body>
</html>
